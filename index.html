<!DOCTYPE html>
<html>
<head>
    <title>VoiceParty</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #40E0D0; color: white; }
        #ses-kutusu { display: flex; justify-content: center; gap: 5px; height: 120px; align-items: flex-end; margin: 20px 0; }
        .bar { width: 15px; background: white; height: 20px; transition: height 0.05s ease; border-radius: 3px; }
        input { padding: 10px; width: 200px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #008080; color: white; border: none; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>

    <h1>VoiceParty</h1>
    <h2 id="durum">Oda hazırlanıyor...</h2>
    
    <div id="ses-kutusu">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <input type="text" id="odaKoduGiris" placeholder="8 haneli kod gir">
    <button onclick="odaKoduylaBaglan()">Bağlan</button>
    <button id="modBtn" onclick="modDegistir()">Mod: Hoparlör</button>

    <script>
        var yerelStream, remoteAudio = new Audio();
        var peer = new Peer(kodOlustur()); 
        var hoparlorModu = true; // true = hoparlör, false = kulaklık

        function kodOlustur() {
            let m = "", c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            for (let i = 0; i < 8; i++) m += c.charAt(Math.floor(Math.random() * c.length));
            return m;
        }

        function modDegistir() {
            hoparlorModu = !hoparlorModu;
            // Hoparlör kapalıysa sesi kıs (kulağa tutma modu)
            remoteAudio.volume = hoparlorModu ? 1.0 : 0.3;
            document.getElementById('modBtn').innerText = hoparlorModu ? "Mod: Hoparlör" : "Mod: Kulaklık";
        }

        navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
            yerelStream = s;
            sesGorsellestir(s);
        });

        peer.on('open', id => document.getElementById('durum').innerText = "Oda Kodun: " + id);

        function sesGorsellestir(s) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaStreamSource(s);
            const ana = ctx.createAnalyser();
            src.connect(ana);
            const data = new Uint8Array(ana.frequencyBinCount);
            function render() {
                ana.getByteFrequencyData(data);
                document.querySelectorAll('.bar').forEach((b, i) => b.style.height = (20 + data[i * 2] / 2) + "px");
                requestAnimationFrame(render);
            }
            render();
        }

        function odaKoduylaBaglan() {
            var kod = document.getElementById("odaKoduGiris").value;
            if (kod.length !== 8) { alert("8 haneli kod gir!"); return; }
            var call = peer.call(kod, yerelStream);
            call.on('stream', s => gelenSesiBaslat(s));
        }

        peer.on('call', call => {
            call.answer(yerelStream);
            call.on('stream', s => gelenSesiBaslat(s));
        });

        function gelenSesiBaslat(s) {
            remoteAudio.srcObject = s;
            remoteAudio.play();
            document.getElementById('durum').innerText = "Bağlantı Başarılı!";
        }
    </script>
</body>
</html>
