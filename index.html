<!DOCTYPE html>
<html>
<head>
    <title>VoiceParty</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20px; background: #40E0D0; color: white; padding: 10px; }
        #ses-kutusu { display: flex; justify-content: center; gap: 5px; height: 80px; align-items: flex-end; margin: 10px 0; }
        .bar { width: 15px; background: white; height: 20px; transition: height 0.05s ease; border-radius: 3px; }
        input { padding: 10px; width: 180px; border-radius: 5px; border: none; }
        button { padding: 10px 15px; cursor: pointer; background: #008080; color: white; border: none; border-radius: 5px; margin: 3px; font-weight: bold; }
        
        /* Uyarı yazısı tasarımı */
        .uyari-footer { font-size: 13px; background: #006666; padding: 15px; margin-top: 50px; border-radius: 10px; font-weight: bold; }
        
        /* Oda listesi */
        #odaListesi { margin-top: 20px; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 10px; }
        .oda-item { background: white; color: #008080; margin: 5px; padding: 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>VoiceParty</h1>
    <h2 id="durum">Oda hazırlanıyor...</h2>
    
    <div id="ses-kutusu">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <input type="text" id="odaKoduGiris" placeholder="8 haneli kod gir">
    <button onclick="odaKoduylaBaglan()">Bağlan</button>
    <button onclick="odamiListeyeEkle()">Odamı Paylaş</button>
    <br>
    <button id="muteBtn" onclick="sesiKapat()">Mikrofon: Açık</button>
    <button id="hoparlorBtn" onclick="hoparlorDegistir()">Hoparlör: Kapalı</button>
    <button id="kapatBtn" onclick="gorusmeyiBitir()" style="background:#e74c3c;">Aramayı Kapat</button>

    <div id="odaListesi">
        <h3>Aktif Odalar (Tıkla Katıl)</h3>
        <ul id="liste" style="list-style: none; padding: 0;"></ul>
    </div>

    <div class="uyari-footer">
        UYARI: Ses odalarında oluşabilecek karşılıklı sorunlardan (küfür, toksiklik, taciz söylemleri) site sahipleri sorumlu değildir.
    </div>

    <script>
        var yerelStream, remoteAudio = new Audio(), aktifCall, benimID;
        var peer = new Peer(kodOlustur()); 
        var sesGidiyor = true, hoparlorAcik = false;

        function kodOlustur() {
            let m = "", c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            for (let i = 0; i < 8; i++) m += c.charAt(Math.floor(Math.random() * c.length));
            return m;
        }

        // Listeye oda ekleme
        function odamiListeyeEkle() {
            var li = document.createElement("li");
            li.className = "oda-item";
            li.innerText = "Odaya Katıl: " + benimID;
            li.onclick = function() { document.getElementById('odaKoduGiris').value = benimID; };
            document.getElementById("liste").appendChild(li);
        }

        function gorusmeyiBitir() {
            if (aktifCall) { aktifCall.close(); aktifCall = null; document.getElementById('durum').innerText = "Görüşme sonlandırıldı."; }
        }

        function sesiKapat() {
            sesGidiyor = !sesGidiyor;
            yerelStream.getAudioTracks()[0].enabled = sesGidiyor;
            document.getElementById('muteBtn').innerText = sesGidiyor ? "Mikrofon: Açık" : "Mikrofon: Kapalı";
        }

        function hoparlorDegistir() {
            hoparlorAcik = !hoparlorAcik;
            remoteAudio.volume = hoparlorAcik ? 1.0 : 0.2;
            document.getElementById('hoparlorBtn').innerText = hoparlorAcik ? "Hoparlör: Açık" : "Hoparlör: Kapalı";
        }

        navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
            yerelStream = s;
            sesGorsellestir(s);
        });

        peer.on('open', id => {
            benimID = id;
            document.getElementById('durum').innerText = "Oda Kodun: " + id;
        });

        peer.on('call', call => {
            if (confirm("'" + call.peer + "' odana katılmak istiyor. Onaylıyor musun?")) {
                aktifCall = call;
                call.answer(yerelStream);
                call.on('stream', s => gelenSesiBaslat(s));
            } else { call.close(); }
        });

        function odaKoduylaBaglan() {
            var kod = document.getElementById("odaKoduGiris").value;
            if (kod.length !== 8) { alert("Geçerli kod gir!"); return; }
            aktifCall = peer.call(kod, yerelStream);
            aktifCall.on('stream', s => gelenSesiBaslat(s));
        }

        function gelenSesiBaslat(s) {
            remoteAudio.srcObject = s;
            remoteAudio.play();
            document.getElementById('durum').innerText = "Bağlantı Başarılı!";
        }

        function sesGorsellestir(s) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaStreamSource(s);
            const ana = ctx.createAnalyser();
            src.connect(ana);
            const data = new Uint8Array(ana.frequencyBinCount);
            function render() {
                ana.getByteFrequencyData(data);
                document.querySelectorAll('.bar').forEach((b, i) => b.style.height = (20 + data[i * 2] / 2) + "px");
                requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
