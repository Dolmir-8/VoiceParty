<!DOCTYPE html>
<html>
<head>
    <title>Sesli Sohbet Odası</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        #durum { color: #2c3e50; }
        input { padding: 10px; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 id="durum">Bağlantı bekleniyor...</h2>
    
    <input type="text" id="odaKoduGiris" placeholder="Arkadaşının Oda Kodunu gir">
    <button onclick="odaKoduylaBaglan()">Odaya Katıl</button>

    <script>
        // PeerJS ile kendi kimliğimizi oluşturuyoruz
        var peer = new Peer(); 

        // PeerJS hazır olduğunda Oda Kodumuzu ekrana yazdır
        peer.on('open', function(id) {
            document.getElementById('durum').innerText = "Odan Hazır! Oda Kodun: " + id;
        });

        // Odaya katılma fonksiyonu
        function odaKoduylaBaglan() {
            var kod = document.getElementById("odaKoduGiris").value;
            
            if (kod == "") {
                alert("Lütfen bir oda kodu gir!");
            } else {
                document.getElementById('durum').innerText = "Bağlanılıyor: " + kod + "...";
                
                // Ses izni al ve aramayı başlat
                navigator.mediaDevices.getUserMedia({audio: true, video: false})
                .then(stream => {
                    var call = peer.call(kod, stream);
                    document.getElementById('durum').innerText = "Bağlantı isteği gönderildi!";
                })
                .catch(err => {
                    alert("Mikrofon izni vermen gerekiyor!");
                });
            }
        }

        // Biri bizi aradığında (gelen aramayı kabul et)
        peer.on('call', function(call) {
            navigator.mediaDevices.getUserMedia({audio: true, video: false})
            .then(stream => {
                call.answer(stream);
                document.getElementById('durum').innerText = "Bağlantı Başarılı! Ses aktarılıyor.";
            });
        });
    </script>
</body>
</html>
